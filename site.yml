---
- name: Install Docker on all hosts
  hosts: all
  gather_facts: no
  become: yes
  roles:
    - docker

- name: Deploy PostgreSQL container on db
  hosts: db
  gather_facts: no
  become: yes
  tasks:
    - name: Run PostgreSQL container
      shell: |
        docker rm -f postgres 2>/dev/null; \
        docker run -d --name postgres \
          -e POSTGRES_DB=app_db \
          -e POSTGRES_USER=app_user \
          -e POSTGRES_PASSWORD=changeme123 \
          -p 5432:5432 \
          --restart unless-stopped \
          postgres:16

- name: Deploy Backend container on app
  hosts: app
  gather_facts: no
  become: yes
  roles:
    - backend
