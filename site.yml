---
- name: Install Docker on all hosts
  hosts: all
  gather_facts: no
  become: yes
  roles:
    - docker

- name: Deploy PostgreSQL container on db
  hosts: db
  gather_facts: no
  become: yes
  tasks:
    - name: Run PostgreSQL container
      docker_container:
        name: postgres
        image: postgres:16
        state: started
        restart_policy: unless-stopped
        env:
          POSTGRES_DB: "app_db"
          POSTGRES_USER: "app_user"
          POSTGRES_PASSWORD: "changeme123"
        ports:
          - "5432:5432"

- name: Deploy Backend container on app
  hosts: app
  gather_facts: no
  become: yes
  roles:
    - backend
