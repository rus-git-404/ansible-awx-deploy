---
- name: Install acl (if needed)
  ansible.builtin.raw: sudo apt-get update && sudo apt-get install -y acl
  changed_when: false

- name: Install PostgreSQL 16
  ansible.builtin.raw: sudo apt-get install -y postgresql-16 python3-psycopg2
  changed_when: false

- name: Start and enable PostgreSQL
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Configure listen_addresses
  ansible.builtin.lineinfile:
    path: /etc/postgresql/16/main/postgresql.conf
    regexp: '^#?listen_addresses'
    line: "listen_addresses = '*'"
  notify: restart postgresql

- name: Copy pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: /etc/postgresql/16/main/pg_hba.conf
    owner: postgres
    group: postgres
    mode: '0640'
  notify: restart postgresql

- name: Create database
  ansible.builtin.shell: |
    sudo -u postgres psql -c "CREATE DATABASE app_db;"
  changed_when: false
  ignore_errors: yes

- name: Create user
  ansible.builtin.shell: |
    sudo -u postgres psql -c "CREATE USER app_user WITH PASSWORD 'changeme123';"
    sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE app_db TO app_user;"
  changed_when: false
  ignore_errors: yes

