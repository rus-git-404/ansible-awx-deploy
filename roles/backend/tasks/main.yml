---
- name: Install Python 3.12 dependencies
  ansible.builtin.raw: sudo apt-get update && sudo apt-get install -y python3.12-venv python3.12-dev python3-pip
  changed_when: false

- name: Create app user
  ansible.builtin.raw: sudo useradd -m -r app 2>/dev/null; true
  changed_when: false

- name: Create directories
  ansible.builtin.raw: sudo mkdir -p /opt/app /var/log/app && sudo chown app:app /opt/app /var/log/app
  changed_when: false

- name: Create virtual environment
  ansible.builtin.raw: sudo -u app python3.12 -m venv /opt/app/venv
  changed_when: false

- name: Install flask in venv
  ansible.builtin.raw: sudo -u app /opt/app/venv/bin/pip install flask
  changed_when: false

- name: Copy app.py
  ansible.builtin.raw: |
    sudo -u app tee /opt/app/app.py << 'EOF'
    from flask import Flask, jsonify
    app = Flask(__name__)
    @app.route('/health')
    def health():
        return jsonify({"status": "ok"})
    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8000)
    EOF
  changed_when: false

- name: Copy app.service
  ansible.builtin.raw: |
    sudo tee /etc/systemd/system/app.service << 'EOF'
    [Unit]
    Description=App backend
    After=network.target
    [Service]
    User=app
    Group=app
    WorkingDirectory=/opt/

