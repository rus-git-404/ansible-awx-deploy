---
- name: Install Python3 and Flask via apt
  raw: |
    sudo apt update -qq && sudo apt install -y python3 python3-pip python3-flask
  become: yes
  changed_when: false

- name: Create directories
  raw: |
    sudo mkdir -p /opt/app /var/log/app && sudo chown -R makl:makl /opt/app /var/log/app
  become: yes
  changed_when: false

- name: Write app.py
  raw: |
    sudo tee /opt/app/app.py > /dev/null <<'PYTHON_EOF'
#!/usr/bin/env python3
from flask import Flask, jsonify
app = Flask(__name__)
@app.route('/health')
def health():
    return jsonify({"status": "ok"})
if __name__ == '__main__':
    app.run(host='0.0.0.0', port=8000, debug=False)
PYTHON_EOF
    sudo chown makl:makl /opt/app/app.py
  become: yes
  changed_when: false

- name: Write systemd service
  raw: |
    sudo tee /etc/systemd/system/app.service > /dev/null <<'SERVICE_EOF'
[Unit]
Description=Python Backend
[Service]
User=makl
WorkingDirectory=/opt/app
ExecStart=/usr/bin/python3 /opt/app/app.py
Restart=always
[Install]
WantedBy=multi-user.target
SERVICE_EOF
  become: yes
  changed_when: false

- name: Enable and start app
  raw: |
    sudo systemctl daemon-reload
    sudo systemctl enable app
    sudo systemctl restart app
  become: yes
  changed_when: false
