---
- name: Install Python3, pip and Flask
  apt:
    name:
      - python3
      - python3-pip
    state: present
  become: yes

- name: Install Flask via APT
  apt:
    name: python3-flask
    state: present
  become: yes

- name: Ensure app user exists
  user:
    name: "{{ app_user }}"
    shell: /bin/bash
    state: present
  become: yes

- name: Create application directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: 0755
  loop:
    - "{{ app_dir }}"
    - "{{ app_log_dir }}"
  become: yes

- name: Copy app.py template
  template:
    src: app.py.j2
    dest: "{{ app_dir }}/app.py"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: 0644
  become: yes

- name: Copy systemd service template
  template:
    src: app.service.j2
    dest: /etc/systemd/system/app.service
  become: yes
  notify: restart app

- name: Enable and start app service
  systemd:
    name: app
    enabled: yes
    state: started
    daemon_reload: yes
  become: yes
