---
- name: Install Python3 and Flask
  raw: |
    sudo apt update -qq && sudo apt install -y python3 python3-pip python3-flask
  become: yes
  changed_when: false

- name: Create directories
  raw: |
    sudo mkdir -p /opt/app /var/log/app && sudo chown -R makl:makl /opt/app /var/log/app
  become: yes
  changed_when: false

- name: Write app.py
  raw: |
    echo "" | base64 -d | sudo tee /opt/app/app.py > /dev/null
  become: yes
  changed_when: false

- name: Write systemd service
  raw: |
    echo "W1VuaXRdCkRlc2NyaXB0aW9uPVB5dGhvbiBCYWNrZW5kCltTZXJ2aWNlXQpVc2VyPW1ha2wKV29ya2luZ0RpcmVjdG9yeT0vb3B0L2FwcC8KRXhlY1N0YXJ0PS91c3IvYmluL3B5dGhvbjMgL29wdC9hcHAvYXBwLnB5ClJlc3RhcnQ9YWx3YXlzCkluc3RhbGw9V2FudGVkQnk9bXVsdGktdXNlci50YXJnZXQ=" | base64 -d | sudo tee /etc/systemd/system/app.service > /dev/null
  become: yes
  changed_when: false

- name: Enable and start app
  raw: |
    sudo systemctl daemon-reload
    sudo systemctl enable app
    sudo systemctl restart app
  become: yes
  changed_when: false
