---
- name: Установка зависимостей Docker
  shell: |
    apt-get update -qq
    apt-get install -y -qq apt-transport-https ca-certificates curl gnupg python3-pip python3-setuptools
  args:
    executable: /bin/bash
  changed_when: false

- name: Добавление GPG-ключа Docker
  shell: |
    if [ ! -f /usr/share/keyrings/docker-archive-keyring.gpg ]; then
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
    fi
  args:
    executable: /bin/bash
  changed_when: false

- name: Добавление репозитория Docker
  shell: |
    if [ ! -f /etc/apt/sources.list.d/docker.list ]; then
      echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list
      apt-get update -qq
    fi
  args:
    executable: /bin/bash
  changed_when: false

- name: Установка Docker
  shell: |
    if ! command -v docker &> /dev/null; then
      apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
    fi
  args:
    executable: /bin/bash
  changed_when: false

- name: Запуск и автозапуск Docker
  shell: |
    systemctl enable --now docker
  args:
    executable: /bin/bash
  changed_when: false

- name: Добавление пользователя app в группу docker
  shell: |
    if ! groups app | grep -q docker; then
      usermod -aG docker app
    fi
  args:
    executable: /bin/bash
  changed_when: false

