---
- name: Установка зависимостей Docker
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - python3-pip
      - python3-setuptools
    state: present
    update_cache: yes

- name: Добавление GPG-ключа Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Добавление репозитория Docker
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Установка Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Запуск и автозапуск Docker
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Добавление пользователя app в группу docker
  user:
    name: app
    groups: docker
    append: yes
